version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stronghold-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: stronghold_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stronghold-network

networks:
  stronghold-network:
    driver: bridge

volumes:
  postgres_data: